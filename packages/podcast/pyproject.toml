[project]
name = "castostudio-ai-podcast"
version = "0.1.0"
description = "Podcast AI module for CastoStudio."
requires-python = ">=3.11"
dependencies = ["castostudio-ai-core>=0.1.0"]

[project.entry-points."castostudio_ai.modules"]
podcast = "castostudio_ai_podcast:PodcastModule"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/castostudio_ai_podcast"]
