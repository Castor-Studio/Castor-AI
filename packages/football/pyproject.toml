[project]
name = "castostudio-ai-football"
version = "0.1.0"
description = "Football AI module for CastoStudio."
requires-python = ">=3.11"
dependencies = ["castostudio-ai-core>=0.1.0"]

[project.entry-points."castostudio_ai.modules"]
football = "castostudio_ai_football:FootballModule"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/castostudio_ai_football"]
