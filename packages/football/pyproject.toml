[project]
name = "castostudio-ai-football"
version = "0.1.0"
description = "Football AI module for CastoStudio."
requires-python = ">=3.11"
dependencies = [
  "castostudio-ai-core>=0.1.0",

  "numpy>=2.0,<2.3",
  "opencv-python==4.12.0.88",
  "opencv-contrib-python",
  "ultralytics==8.3.228",
  "dill==0.4.1",

  "torch",
  "torchvision",
]

[project.entry-points."castostudio_ai.modules"]
football = "castostudio_ai_football:FootballModule"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/castostudio_ai_football"]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'win32'" },
]